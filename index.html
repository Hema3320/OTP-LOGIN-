<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OTP Login — Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Animated background -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="page-wrapper">

    <!-- Card -->
    <div class="card" id="auth-card">

      <!-- Logo -->
      <div class="brand">
        <div class="brand-icon">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <path d="M11 2L3 6V11C3 15.418 6.582 19.418 11 21C15.418 19.418 19 15.418 19 11V6L11 2Z" stroke="white" stroke-width="1.6" stroke-linejoin="round"/>
            <path d="M8 11L10.5 13.5L14.5 9" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="brand-name">Vault</span>
      </div>

      <!-- Step indicators -->
      <div class="steps">
        <div class="step active" id="step-1"></div>
        <div class="step-line"></div>
        <div class="step" id="step-2"></div>
        <div class="step-line"></div>
        <div class="step done-hidden" id="step-3"></div>
      </div>

      <!-- ===== SCREEN 1: Email ===== -->
      <div class="screen active" id="screen-email">
        <div class="screen-header">
          <h1>Welcome back</h1>
          <p>Enter your email and we'll send you a secure login code.</p>
        </div>

        <div class="form-group">
          <label for="email-input">Email address</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="1" y="3" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.3"/>
              <path d="M1.5 4.5L8 9L14.5 4.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            <input type="email" id="email-input" placeholder="you@example.com" autocomplete="email" />
          </div>
          <span class="field-error" id="email-error"></span>
        </div>

        <button class="btn-primary" id="send-otp-btn" onclick="handleSendOTP()">
          <span class="btn-text">Send code</span>
          <svg class="btn-arrow" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 8H13M9 4L13 8L9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <p class="footnote">Protected by end-to-end encryption. <a href="#">Privacy policy</a></p>
      </div>

      <!-- ===== SCREEN 2: OTP ===== -->
      <div class="screen" id="screen-otp">
        <div class="screen-header">
          <h1>Check your inbox</h1>
          <p>A 6-digit code was sent to<br/><strong id="email-display-text"></strong></p>
        </div>

        <div class="otp-group" id="otp-group">
          <input class="otp-box" type="text" inputmode="numeric" maxlength="1" id="otp-0" />
          <input class="otp-box" type="text" inputmode="numeric" maxlength="1" id="otp-1" />
          <input class="otp-box" type="text" inputmode="numeric" maxlength="1" id="otp-2" />
          <div class="otp-separator"></div>
          <input class="otp-box" type="text" inputmode="numeric" maxlength="1" id="otp-3" />
          <input class="otp-box" type="text" inputmode="numeric" maxlength="1" id="otp-4" />
          <input class="otp-box" type="text" inputmode="numeric" maxlength="1" id="otp-5" />
        </div>

        <span class="field-error center" id="otp-error"></span>

        <button class="btn-primary" id="verify-otp-btn" disabled onclick="handleVerifyOTP()">
          <span class="btn-text">Verify &amp; Sign in</span>
          <svg class="btn-arrow" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 8H13M9 4L13 8L9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <div class="resend-row">
          <span class="timer-text">Code expires in <strong id="timer-display">2:00</strong></span>
          <button class="btn-link" id="resend-btn" disabled onclick="handleResend()">Resend code</button>
        </div>

        <button class="btn-back" onclick="goBack()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M11 7H3M6 3L2 7L6 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Change email
        </button>
      </div>

      <!-- ===== SCREEN 3: Success ===== -->
      <div class="screen" id="screen-success">
        <div class="success-animation">
          <div class="success-ring"></div>
          <div class="success-check">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
              <path class="check-path" d="M6 14L11.5 19.5L22 9" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>

        <div class="screen-header" style="margin-top: 1.5rem;">
          <h1>You're in!</h1>
          <p>Identity verified successfully.</p>
        </div>

        <div class="user-card">
          <div class="user-avatar" id="user-avatar">U</div>
          <div class="user-details">
            <strong id="user-name-display">User</strong>
            <span id="user-email-final"></span>
          </div>
          <div class="verified-badge">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M2.5 6L5 8.5L9.5 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Verified
          </div>
        </div>

        <button class="btn-primary" onclick="handleSignOut()" style="margin-top: 1.25rem;">
          <span class="btn-text">Sign out</span>
        </button>
      </div>

    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1L7 7M7 10L7 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span id="toast-text"></span>
    </div>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
